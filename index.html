<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP will be set by Electron in production -->
  <title>Stoodio MD</title>
</head>

<body>
  <div id="app">
    <header id="titlebar" class="titlebar">
      <div id="filename-container" class="filename-container">
        <span id="filename" class="filename">Untitled</span>
        <svg class="filename-chevron" width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1 2.5L4 5.5L7 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>

        <div id="filename-popover" class="filename-popover">
          <div class="popover-arrow"></div>
          <div class="popover-content">
            <div class="popover-row">
              <label for="document-name">Name:</label>
              <input type="text" id="document-name" value="Untitled">
            </div>
            <div class="popover-row">
              <label for="document-tags">Tags:</label>
              <div class="tags-input-container">
                <input type="text" id="document-tags" placeholder="Add Tags">
              </div>
            </div>
            <div class="popover-row">
              <label>Where:</label>
              <div id="document-location" class="location-picker">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" style="color: #007aff;">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span id="location-text">Desktop — iCloud</span>
                <svg width="10" height="10" viewBox="0 0 10 10" style="opacity: 0.5;">
                  <path d="M3 4L5 6L7 4" stroke="currentColor" fill="none" stroke-width="1.2" />
                </svg>
              </div>
              <div class="locked-container">
                <input type="checkbox" id="document-locked">
                <label for="document-locked">Locked</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button id="toggle-source-btn" class="titlebar-btn" title="Toggle Source Code">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
      </button>
    </header>

    <!-- Tab Bar -->
    <div id="tab-bar" class="tab-bar">
      <div id="tabs-container" class="tabs-container"></div>
      <button id="new-tab-btn" class="new-tab-btn" title="New Tab (⌘N)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <!-- Find & Replace Panel -->
    <div id="find-replace-panel" class="find-replace-panel">
      <div class="find-replace-content">
        <div class="find-row">
          <input type="text" id="find-input" class="find-input" placeholder="Find...">
          <span id="find-count" class="find-count">0/0</span>
          <button id="find-prev-btn" class="find-btn" title="Previous (Cmd+Shift+G)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
          </button>
          <button id="find-next-btn" class="find-btn" title="Next (Cmd+G)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <button id="find-close-btn" class="find-btn find-close" title="Close (Esc)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="replace-row" id="replace-row">
          <input type="text" id="replace-input" class="find-input" placeholder="Replace...">
          <button id="replace-btn" class="find-btn find-btn-text">Replace</button>
          <button id="replace-all-btn" class="find-btn find-btn-text">All</button>
        </div>
        <div class="find-options">
          <label class="find-option">
            <input type="checkbox" id="find-match-case">
            <span>Match Case</span>
          </label>
        </div>
      </div>
    </div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="outline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          <span>Outline</span>
        </button>
        <button class="sidebar-tab" data-tab="files">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          <span>Files</span>
        </button>
      </div>
      <nav id="outline" class="sidebar-panel outline active"></nav>
      <div id="file-tree" class="sidebar-panel file-tree"></div>
      <div id="sidebar-resizer" class="sidebar-resizer"></div>
    </aside>
    <main id="editor-container" class="editor-container">
      <div id="editor" spellcheck="false"></div>
    </main>
  </div>
  <script type="module" src="/src/renderer/main.js"></script>
</body>

</html>
